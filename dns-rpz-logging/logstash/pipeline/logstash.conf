    rename => {
      "dst"  => "network.response-ip"
      "src"  => "network.query-ip"
      "spt"  => "network.query-port"
      "view" => "dns.view"
      "qtype" => "dns.qtype"
    }
  }
  ruby {
        code => "event.set('dnstap.timestamp-rfc3339ns', Time.now());"
    }
  #
  # Extract DNS query and RPZ match from msg
  #
  grok {
    match => {
      "msg" => "rpz %{WORD:dns.rpz.trigger} %{WORD} rewrite %{HOSTNAME:dns.qname} \[%{WORD}\] via %{GREEDYDATA:dns.rpz.via}"
    }
  }
