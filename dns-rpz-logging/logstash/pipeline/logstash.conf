input {
  udp {
    port => 514
    type => "syslog"
  }
}

filter {

  #
  # Parse standard syslog header
  #
  grok {
    match => {
      "message" => "%{SYSLOGTIMESTAMP:syslog.timestamp} %{HOSTNAME:syslog.host} %{DATA:syslog.program}: %{GREEDYDATA:cef_message}"
    }
    overwrite => [ "message" ]
  }

  #
  # Parse the CEF header
  #
  grok {
    match => {
      "cef_message" => "CEF:%{INT:cef.version}\|%{DATA:vendor.name}\|%{DATA:vendor.os}\|%{DATA:vendor.version}\|%{DATA:cef.signature}\|%{DATA:dns.response}\|%{INT:cef.severity}\|%{GREEDYDATA:cef.extension}"
    }
  }

  #
  # Parse key=value pairs in CEF extension
  #
  kv {
    source => "cef.extension"
    field_split => " "
    value_split => "="
  }

  #
  # Map extension fields to desired ECS-style fields
  #
  mutate {
    rename => {
      "dst"  => "network.response-ip"
      "src"  => "network.query-ip"
      "spt"  => "network.query-port"
      "view" => "dns.view"
      "qtype" => "dns.qtype"
    }
  }
  ruby {
        code => "event.set('dnstap.timestamp-rfc3339ns', Time.now());"
    }
  #
  # Extract DNS query and RPZ match from msg
  #
  grok {
    match => {
      "msg" => "rpz %{WORD:dns.rpz.trigger} %{WORD} rewrite %{HOSTNAME:dns.qname} \[%{WORD}\] via %{GREEDYDATA:dns.rpz.via}"
    }
  }
  
  ruby {
    code => '
      qname = event.get("dns.qname")
      rpz_zone = event.get("dns.rpz.via")

      if qname && rpz_zone
        # Remove the qname prefix and strip any leading dot
        remainder = rpz_zone.sub(/\A#{Regexp.escape(qname)}\.?/, "")
        event.set("dns.rpz.zone", remainder)
      end
    '
  }

  #
  # Infoblox TIDE threat intelligence lookup on dns.qname
  # Local cache: max 1,000 entries, 6-hour TTL
  #
  ruby {
    init => 'load "/usr/share/logstash/ruby/tide_init.rb"'
    path => "/usr/share/logstash/ruby/tide_lookup.rb"
  }

  mutate {
    copy => { "dns.response" => "dns.rcode" }
  }
  #
  # Cleanup
  #
  mutate {
    remove_field => ["cef.extension"]
  }
}

output {
  stdout { codec => rubydebug }

  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "dns-rpz-logs"
  }
}

