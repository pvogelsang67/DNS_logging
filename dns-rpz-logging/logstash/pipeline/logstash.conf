    code => '
      qname = event.get("dns.qname")
      rpz_zone = event.get("dns.rpz.via")

      if qname && rpz_zone
        # Remove the qname prefix and strip any leading dot
        remainder = rpz_zone.sub(/\A#{Regexp.escape(qname)}\.?/, "")
