################################################
# global configuration
#  more details: https://github.com/dmachard/DNS-collector/blob/main/docs/configuration.md#global
################################################
global:
  trace:
    verbose: true
    log-malformed: true
    filename: ""
    max-size: 10
    max-backups: 10
  server-identity: "dns-collector"
  pid-file: ""
  text-format: "timestamp-rfc3339ns identity operation rcode queryip queryport family protocol length-unit qname qtype latency"
  text-format-delimiter: " "
  text-format-boundary: "\""
  text-jinja: ""
  worker:
    interval-monitor: 10
    buffer-size: 8192
  telemetry:
    enabled: false
    web-path: "/metrics"
    web-listen: ":9165"
    prometheus-prefix: "dnscollector_exporter"
    tls-support: false
    tls-cert-file: ""
    tls-key-file: ""
    client-ca-file: ""
    basic-auth-enable: false
    basic-auth-login: admin
    basic-auth-pwd: changeme

################################################
# Pipelining configuration
#   more details: https://github.com/dmachard/DNS-collector/blob/main/docs/running_mode.md#pipelining
#   workers: https://github.com/dmachard/DNS-collector/blob/main/docs/workers.md
#   transformers: https://github.com/dmachard/DNS-collector/blob/main/docs/transformers.md
################################################
pipelines:
  - name: tap
    dnstap:
      listen-ip: 0.0.0.0
      listen-port: 6000
    transforms:
      normalize:
        qname-lowercase: true
        qname-replace-nonprintable: true
    routing-policy:
      forward: [ elastic ]
      dropped: [ ]

#  - name: console
#    stdout:
#      mode: text

  - name: elastic
    elasticsearch:
      server: http://elasticsearch:9200
      index:  "dnscollector"
      chan-buffer-size: 0
      bulk-size: 1048576 # 1MB
      flush-interval: 10 # in seconds
      compression: none
      bulk-channel-size: 10

      basic-auth-enable: false
      basic-auth-login: elastic
      basic-auth-pwd: elastic
      retry-enable: true
      retry-max-attempts: 5
      retry-initial-delay: 1  # in seconds
      retry-max-delay: 30     # in seconds
